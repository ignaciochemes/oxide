name: Release

# Al pushear un tag tipo v0.4.0, compila binarios y los sube al Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: oxide-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: oxide-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: oxide-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # 'ring' (TLS) necesita nasm para compilar el assembly en Windows/MSVC.
      - name: Instalar nasm (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Empaquetar binario (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/oxide ${{ matrix.name }}
      - name: Empaquetar binario (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\oxide.exe ${{ matrix.name }}
      - name: Subir al Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
